<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>EXPENSE TRACKER</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="main">
      <div class="sidebar">
         <div class="logo"> <h2> SPENDWISE </h2></div>
         <div class="menu">
            <div class="nav-item active"> HOME  </div>
            <div class="nav-item">Transactions</div>
            <div class="nav-item">Analytics</div>
            <div class="nav-item">Budget</div>
            <div class="nav-item">Profile</div>
            <div class="nav-item">Settings</div>
         </div>
      </div>
      <div class="content">
         <div class="header">
            <div class="header-left">
               <input type="text" placeholder="search transactions">
            </div>
            <div class="header-right">
               <button id="btn"> + Add Expense</button>
               <span class="notification">🔔</span>
               <span class="profile">👤</span>
            </div>
         </div>
         <div class="cards">
            <div class="card"><p>Total Expense</p><h2 id="totalexpen">$0</h2></div>
            <div class="card"><p>Monthly Income</p><h2 id="monthincom">$8400</h2></div>
            <div class="card"><p>Monthly Expense</p><h2 id="monthexpen">$3210</h2></div>
            <div class="card"><p>Net Savings</p><h2 id="savings">$5280</h2></div>
         </div>
         <div class="charts">
            <div class="chart-box">
               <canvas id="line-chart"></canvas>
            </div>
            <div class="chart-box">
               <canvas id="pie-chart"></canvas>
            </div>
         </div>
         <div class="modal" >
            <form id="addexpen">
               <input id="expen" type="text" name="Expense Name" placeholder="enter expense">
               <input id="amt" type="number" name="amount" placeholder="amount in dollars">
               <select name="expense type" id="expentype">
                  <option value="Food">Food</option>
                  <option value="Transport">Transport</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Bills">Bills</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Health">Health</option>
                  <option value="Travel">Travel</option>
                  <option value="Education">Education</option>
                  <option value="Other">Other</option>
               </select>
               <input id="expendate" type="date" name="date of expense" placeholder="dd/mm/yy">
               <button id="butn">SUBMIT</button>
               <button id="close" type="button">cancel</button>
            </form>
         </div>
         <div class="transactions">
            <div class="heading">
               <table>
                  <thead>
                  <tr>
                     <th>Expense Name</th>
                     <th>category</th>
                     <th>amount</th>
                     <th>date</th>
                  </tr>
                  </thead>
                  <tbody id="tabbody"></tbody>
               </table>
            </div>
         </div>
         <div class="rest">
         </div>
      </div>
   </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
<script src="main.js"></script> 
</body>
</html>
